- name: Installer Docker et Docker Compose
  hosts: all
  become: yes

  vars:
    docker_gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
    docker_repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu focal stable"

  tasks:

    - name: Installer les dépendances nécessaires
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Créer le dossier keyrings
      file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Télécharger la clé GPG Docker
      get_url:
        url: "{{ docker_gpg_url }}"
        dest: /usr/share/keyrings/docker.gpg
        mode: '0644'

    - name: Ajouter le dépôt Docker officiel
      apt_repository:
        repo: "{{ docker_repo }}"
        state: present
        filename: docker

    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes

    - name: Installer Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Activer et démarrer Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Ajouter l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Vérifier installation Docker
      command: docker --version
      register: docker_version

    - name: Afficher version Docker
      debug:
        msg: "{{ docker_version.stdout }}"
